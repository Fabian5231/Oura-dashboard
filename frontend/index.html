<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oura Ring Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
</head>
<body>
<div class="toolbar">
    <div class="toolbar-group">
        <label class="toolbar-label">Zeitraum</label>
        <div class="date-range-picker">
            <input type="date" id="startDate">
            <span class="date-separator">–</span>
            <input type="date" id="endDate">
        </div>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <label class="toolbar-label">Schnellwahl</label>
        <div class="btn-row">
            <button class="btn" id="btnYesterday" onclick="setYesterday()">Gestern</button>
            <button class="btn" id="btnAll" onclick="setAllTime()">Alles</button>
        </div>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <label class="toolbar-label">Sync</label>
        <div class="btn-row">
            <button class="btn btn-sync" id="syncBtn" onclick="triggerSync()">Sync</button>
            <select class="btn" id="syncInterval" onchange="setSyncInterval(this.value)" title="Auto-Sync Intervall">
                <option value="0">Aus</option>
                <option value="60">1h</option>
                <option value="180">3h</option>
                <option value="360" selected>6h</option>
                <option value="720">12h</option>
                <option value="1440">24h</option>
            </select>
        </div>
    </div>
    <div class="toolbar-divider"></div>
    <div class="toolbar-group">
        <label class="toolbar-label">Ansicht</label>
        <div class="btn-row">
            <button class="btn" id="widgetBtn" onclick="toggleWidgetPanel()">Widgets</button>
            <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Light/Dark Mode"></button>
        </div>
    </div>
</div>

<div class="subtitle" id="subtitle"></div>
<div class="grid" id="widgetGrid"></div>

<!-- Widget Settings Panel -->
<div class="widget-panel-overlay" id="panelOverlay" onclick="toggleWidgetPanel()"></div>
<div class="widget-panel" id="widgetPanel">
    <button class="widget-panel-close" onclick="toggleWidgetPanel()">&times;</button>
    <h3>Widgets</h3>
    <div class="widget-panel-actions">
        <button class="btn btn-small" onclick="toggleAllWidgets(true)">Alle an</button>
        <button class="btn btn-small" onclick="toggleAllWidgets(false)">Alle aus</button>
    </div>
    <div id="widgetToggles"></div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
